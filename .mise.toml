[tools]
lazygit = "latest"
jq = "latest"
ripgrep = "latest"

python = "3.13"
uv = "latest"
ruff = "latest"

[env]
_.file = ".env"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.lint]
description = "Run ruff lint checks"
run = "uv run ruff check ."

[tasks.format]
description = "Format the codebase with ruff"
run = "uv run ruff format ."

[tasks.check]
description = "Run lint and tests"
depends = ["lint", "test"]


[tasks.publish]
description = "Run release checks, build, validate, test-install, and upload to PyPI"
run = "bash deploy/publish.sh"

[tasks.docs]
description = "Preview docs with live Quarto and quartodoc updates"
depends = ["docs:quartodoc", "docs:preview"]

[tasks."docs:preview"]
description = "Run the Quarto documentation preview server"
run = "uv run --group docs quarto preview docs"

[tasks."docs:quartodoc"]
description = "Watch source changes and rebuild quartodoc API pages"
run = "uv run --group docs quartodoc build --config docs/_quarto.yml --watch"
