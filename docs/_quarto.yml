project:
  type: website
  output-dir: _site

metadata-files:
  - reference/_sidebar.yml

website:
  title: "drisk"
  site-url: "https://nick-dorsch.github.io/drisk/"
  repo-url: "https://github.com/nick-dorsch/drisk"
  repo-actions: [source, issue]
  description: "Examples and reports for composable Monte Carlo modelling with drisk."
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: reference/index.qmd
        text: Reference
      - text: Examples
        menu:
          - href: examples/distributions.qmd
            text: Working with distributions
          - href: examples/mc-composition.qmd
            text: Monte Carlo composition
          - href: examples/sensitivity-analysis.qmd
            text: Sensitivity analysis
          - href: examples/mixtures.qmd
            text: Distribution mixtures
          - href: examples/correlated-sampling.qmd
            text: Correlated sampling with copulas
          - href: examples/equipment-failures.qmd
            text: Equipment failures
          - href: examples/prospect-evaluation.qmd
            text: Prospect evaluation
          - href: examples/decision-trees.qmd
            text: Decision trees
    right:
      - icon: github
        href: "https://github.com/nick-dorsch/drisk"
        aria-label: GitHub repository

format:
  html:
    theme: journal
    toc: true
    toc-depth: 4
    code-fold: false
    code-copy: true
    number-sections: false
    css:
      - reference/_styles-quartodoc.css

quartodoc:
  package: drisk
  style: pkgdown
  dir: reference
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  parser: google
  dynamic: true
  sections:
    - title: Distributions
      desc: Core distribution interfaces and implementations.
      contents:
        - Distribution
        - Normal
        - LogNormal
        - LogitNormal
        - Beta
        - StretchedBeta
        - PERT
        - Gamma
        - Exponential
        - Bernoulli
        - Binomial
        - Poisson
        - Geometric
        - NegativeBinomial
        - UvMixture
    - title: Distribution domains
      desc: Marker classes for distribution domain semantics.
      contents:
        - UvDistribution
        - UvContinuous
        - UvRealContinuous
        - UvPositiveContinuous
        - UvBoundedContinuous
        - UvUnitBoundedContinuous
        - UvDiscrete
        - UvFiniteDiscrete
        - UvCountDiscrete
    - title: Correlation and copulas
      desc: Tools for correlated sampling.
      contents:
        - CorrelationMatrix
        - Copula
        - GaussianCopula
        - StudentTCopula
    - title: Monte Carlo models
      desc: Composable model helpers.
      contents:
        - MCModel
        - MCOperation
        - where
    - title: Sensitivity analysis
      desc: One-at-a-time sensitivity tooling.
      contents:
        - OneAtATimeSensitivity
        - one_at_a_time
    - title: Decision trees
      desc: Decision tree primitives.
      contents:
        - DTree
        - DTreeNode
        - DecisionNode
        - ChanceNode
        - OutcomeNode
        - DecisionBranch
        - ChanceBranch

execute:
  warning: false
  message: false
